name: CI – Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - staging-v2

jobs:
  # ── Job 1: Fast Fails ──────────────────────────────────────
  # Runs on raw source — no build required.
  # If any fail, no point waiting for the Cloudflare preview.
  fast-checks:
    name: Lint / Typecheck / Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Linting (ESLint)
        run: npm run lint

      - name: Type-check (astro check)
        run: npm run check
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Unit Tests (Vitest)
        run: npm test

  # ── Job 2: Integration Tests on Cloudflare Preview ─────────
  # Polls the GitHub Commit Status API until Cloudflare Pages
  # posts a success status, then runs E2E / a11y / perf / links
  # against the live preview URL.
  integration:
    name: E2E / A11y / Perf / Links
    runs-on: ubuntu-latest
    needs: fast-checks
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Cloudflare Pages preview deployment
        id: cf-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Polling for Cloudflare Pages deployment on commit ${COMMIT_SHA}..."
          MAX_ATTEMPTS=60   # 60 × 10s = 10 minutes
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            # Query the GitHub Commit Statuses API for this SHA
            STATUSES=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${COMMIT_SHA}/statuses")

            # Look for a Cloudflare Pages status with state "success"
            # Cloudflare's context string typically contains "Cloudflare Pages"
            PREVIEW_URL=$(echo "$STATUSES" | jq -r '
              [ .[] | select(.context | test("cloudflare"; "i")) | select(.state == "success") ]
              | first | .target_url // empty
            ')

            if [ -n "$PREVIEW_URL" ]; then
              echo "Found Cloudflare preview: $PREVIEW_URL"
              echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "  Attempt ${ATTEMPT}/${MAX_ATTEMPTS} — no success status yet, waiting 10s..."
            sleep 10
          done

          echo "::error::Timed out waiting for Cloudflare Pages deployment"
          exit 1

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: E2E & Accessibility Tests (Playwright)
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.cf-preview.outputs.preview_url }}

      - name: Performance Audit (Lighthouse CI)
        run: |
          npx lhci autorun \
            --collect.url="${{ steps.cf-preview.outputs.preview_url }}/" \
            --collect.startServerCommand="" \
            --collect.numberOfRuns=1
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Link Crawl (Linkinator)
        run: npx linkinator ${{ steps.cf-preview.outputs.preview_url }} --recurse --timeout 30000
